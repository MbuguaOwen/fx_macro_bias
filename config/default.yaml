pairs:
  - EURUSD
  - GBPUSD
  - GBPCHF
  - USDJPY
  - USDCHF
  - USDCAD
  - AUDUSD
  - NZDUSD
  - EURJPY
  - GBPJPY
  - EURGBP
  - EURCHF
  - AUDJPY
  - XAUUSD
  - XAGUSD
  - XPTUSD
  - XPDUSD
  - USOIL

weights:
  rates: 0.45
  growth: 0.20
  risk: 0.15
  positioning: 0.20

# --- Pillar mappings / tickers ---
# Stooq CSV format: https://stooq.com/q/d/l/?s=<symbol>&i=d
stooq:
  # 2Y yield tickers (proxy for rate differentials)
  yields_2y:
    USD: "2yusy.b"
    EUR: "2ydey.b"   # Germany proxy for EUR rates
    GBP: "2yuky.b"
    JPY: "2yjpy.b"
    CHF: "2ychy.b"
    CAD: "2ycay.b"
    AUD: "2yauy.b"
    NZD: "2ynzy.b"

  # Equity indices for growth proxy (3M relative return)
  equity_index:
    USD: "^spx"
    EUR: "^dax"      # Germany proxy when EuroStoxx symbol is unavailable on Stooq
    GBP: "^ukx"      # FTSE 100
    JPY: "^nkx"      # Nikkei 225 proxy on Stooq
    CHF: "^smi"
    CAD: "^tsx"
    AUD: "^aor"      # All Ordinaries
    NZD: "^nz50"

  # Risk proxies
  risk:
    spx: "^spx"
    # VIX / dollar index are sourced from FRED in the engine (see `fred:` below).
    vix: "^vix"
    dxy: "dxy"

fred:
  risk:
    vix: "VIXCLS"
    dxy: "DTWEXBGS"   # broad trade-weighted USD (daily, FRED)

cftc:
  # Socrata datasets
  tff_futures_only: "gpe5-46if"       # Traders in Financial Futures (futures only)
  disagg_futures_only: "72hh-3qpy"    # Disaggregated (futures only)

  # Contract name matching for currency futures in TFF (market_and_exchange_names contains these)
  # You can refine these strings as needed.
  currency_contract_match:
    EUR: "EURO FX"
    GBP: "BRITISH POUND"
    JPY: "JAPANESE YEN"
    CHF: "SWISS FRANC"
    CAD: "CANADIAN DOLLAR"
    AUD: "AUSTRALIAN DOLLAR"
    NZD: "NZ DOLLAR"
    USD: "U.S. DOLLAR INDEX"  # optional

  # Metals in Disaggregated
  metal_contract_match:
    XAU: "GOLD"
    XAG: "SILVER"
    XPT: "PLATINUM"
    XPD: "PALLADIUM"
  positioning:
    usd_zero_baseline: true

thresholds:
  bias_threshold: 0.20
  # Optional per-pair overrides. Useful when a cross is structurally skewed and rarely flips.
  # pair_overrides:
  #   EURGBP:
  #     bias_threshold: 0.25

conviction:
  neutral_threshold: 0.15
  bands:
    weak: 0.20
    moderate: 0.45
    strong: 0.70
    extreme: 1.01

staleness:
  days:
    rates: 5
    growth: 45
    cesi: 7
    pmi: 45
    risk: 5
    # Optional component overrides for the risk pillar.
    # If DXY is stale, the engine will automatically disable USD tilts rather than silently carrying them.
    # risk_dxy: 5
    # risk_spx: 5
    # risk_vix: 5
    positioning: 10

# Growth "hard" mode is supported but optional. It requires TradingEconomics API access for
# CESI + PMI by country (configure env var TRADINGECONOMICS_API_KEY). If unavailable, keep
# mode=proxy or set fallback_to_proxy=true.
growth:
  mode: "proxy"   # set to "hard" to use CESI + PMI (TradingEconomics API)
  sources: ["cesi", "pmi"]
  weights:
    cesi: 0.7
    pmi: 0.3
  neutral_threshold: 0.15
  zscore_window_days: 756   # ~3y
  normalize_method: "tanh"  # "tanh" or "zscore"
  scales:
    cesi: 50.0
    pmi: 3.0
  fallback_to_proxy: false
  te:
    country_map:
      USD: "united states"
      EUR: "euro area"
      GBP: "united kingdom"
      JPY: "japan"
      CHF: "switzerland"
      CAD: "canada"
      AUD: "australia"
      NZD: "new zealand"
    indicator_map:
      cesi: "economic surprise index"
      pmi: "manufacturing pmi"

tradingeconomics:
  api_key_env: "TRADINGECONOMICS_API_KEY"

market_overlay:
  enabled: false
  provider: investing
  url_env: FXBIAS_OPTIONS_URL
  default_symbol: XAUUSD
  default_tenor: 1M

sentiment_overlay:
  enabled: false
  affects_core_score: false
  show_in_report: true
  thresholds:
    bias_threshold: 0.20
  staleness:
    default_days: 10
    signals:
      cot: 10
      real_yields: 5
      dxy: 5
      etf_flows: 14
      vix: 5
      gold_silver_ratio: 5
      boj_tone: 5
      rate_diff: 5
      risk_sentiment: 5
      intervention_risk: 5
      eia_inventories: 10
      opec_stance: 30
      usd: 5
      baker_hughes_rig_count: 14
  weights:
    metals:
      cot: 0.30
      real_yields: 0.25
      dxy: 0.20
      etf_flows: 0.15
      vix: 0.10
      gold_silver_ratio: 0.0
    jpy:
      boj_tone: 0.25
      rate_diff: 0.25
      risk_sentiment: 0.20
      cot: 0.20
      intervention_risk: 0.10
    oil:
      eia_inventories: 0.25
      opec_stance: 0.20
      cot: 0.20
      usd: 0.15
      risk_sentiment: 0.10
      baker_hughes_rig_count: 0.10
  families:
    metals:
      instruments: [XAUUSD, XAGUSD, XPTUSD, XPDUSD]
      real_yields:
        series_id: DFII10
        trend_window: 20
        scale: 0.35
      dxy:
        series_id: DTWEXBGS
        trend_window: 50
        scale: 2.5
      vix:
        series_id: VIXCLS
        trend_window: 20
        scale: 4.0
        silver_sensitivity: 0.5
      ratio:
        gold_symbol: xauusd
        silver_symbol: xagusd
        trend_window: 20
        scale: 2.0
    jpy:
      instruments: [USDJPY, GBPJPY, EURJPY, AUDJPY, NZDJPY]
      boj_tone:
        jgb2y_symbol: 2yjpy.b
        fast_window: 20
        slow_window: 60
        scale: 0.10
      risk_sentiment:
        multipliers:
          USDJPY: 0.75
          EURJPY: 0.75
          GBPJPY: 0.85
          AUDJPY: 1.00
          NZDJPY: 1.00
      intervention_risk:
        anchor_symbol: usdjpy
        high_level: 155.0
        extreme_level: 160.0
        trend_days: 63
        trend_threshold: 0.08
    oil:
      instruments: [USOIL, WTI]
      cot:
        dataset_id: 72hh-3qpy
        contract_name: null
      usd:
        series_id: DTWEXBGS
        trend_window: 50
        scale: 2.5
      baker_hughes_rig_count:
        series_id: null
        trend_window: 26
        scale: 40.0
  manual_signals: {}

report_notes:
  instrument_notes:
    NAS100: "Clean trends, high volume, NY session perfect"
    US30: "Clean trends, high volume, NY session perfect"
    WTI: "Strong NY mover, similar character to Gold"

cache_dir: ".cache"
